name: Dagelijkse X-post

# Wanneer:
#  - 13:00 UTC = 14:00 CET (winter) / 15:00 CEST (zomer).
#    Day-ahead-prijzen voor morgen worden door EPEX rond 13:00 CET vrijgegeven.
#    We posten een halfuur tot anderhalf uur later, zodat de meest recente
#    fetch_prices.py-run (cron */3 op het hele uur) de prijzen al heeft binnengehaald.
#  - Manueel via 'Run workflow' in de GitHub UI (workflow_dispatch).
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-tweet
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy pillow matplotlib

      - name: Genereer + post X-bericht
        # Mag falen zonder dat dit alarm geeft — een hobbysite zonder cijfers vandaag
        # is geen incident. De volgende run probeert het opnieuw.
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python scripts/daily_post.py

      - name: Upload preview-image als CI-artifact
        # Handig om achteraf te zien wat er gepost is, ook als de tweet zelf faalde.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-preview
          path: /tmp/daily_post.jpg
          if-no-files-found: ignore
          retention-days: 14
